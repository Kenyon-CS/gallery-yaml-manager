schema_version: "2.0"

gallery:
  id: "gallery_01"
  name: "Algorithms Gallery"
  subtitle: "Rooms and wall structures for layout experiments"
  location: "Applied Algorithms Lab"
  notes: "Textual structural model of gallery rooms, walls, doors, and windows."

  rooms:
    - id: "R1"
      name: "Main Gallery"
      width_ft: 30.0
      height_ft: 20.0
      ceiling_height_ft: 10.0
      notes: "Primary public room."

      walls:
        - id: "R1-N"
          label: "North Wall"
          orientation: "north"
          length_ft: 30.0
          height_ft: 10.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

        - id: "R1-S"
          label: "South Wall"
          orientation: "south"
          length_ft: 30.0
          height_ft: 10.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

        - id: "R1-E"
          label: "East Wall"
          orientation: "east"
          length_ft: 20.0
          height_ft: 10.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

        - id: "R1-W"
          label: "West Wall"
          orientation: "west"
          length_ft: 20.0
          height_ft: 10.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

    - id: "R2"
      name: "Side Gallery"
      width_ft: 18.0
      height_ft: 14.0
      ceiling_height_ft: 9.0
      notes: "Secondary room for smaller experiments."

      walls:
        - id: "R2-N"
          label: "North Wall"
          orientation: "north"
          length_ft: 18.0
          height_ft: 9.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

        - id: "R2-S"
          label: "South Wall"
          orientation: "south"
          length_ft: 18.0
          height_ft: 9.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

        - id: "R2-E"
          label: "East Wall"
          orientation: "east"
          length_ft: 14.0
          height_ft: 9.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

        - id: "R2-W"
          label: "West Wall"
          orientation: "west"
          length_ft: 14.0
          height_ft: 9.0
          thickness_ft: 0.5
          displayable: true
          default_hang_y_ft: 5.0
          finish: "plaster"
          notes: ""

  doors:
    - id: "D1"
      name: "Main-to-Side Door"
      width_ft: 3.0
      height_ft: 7.0
      type: "swing"
      notes: ""

      endpoint_a:
        room_id: "R1"
        wall_id: "R1-E"
        offset_ft: 8.0

      endpoint_b:
        room_id: "R2"
        wall_id: "R2-W"
        offset_ft: 4.0

  windows:
    - id: "WIN1"
      room_id: "R1"
      wall_id: "R1-N"
      name: "North Window 1"
      width_ft: 5.0
      height_ft: 4.0
      sill_height_ft: 3.0
      offset_ft: 10.0
      notes: ""

    - id: "WIN2"
      room_id: "R2"
      wall_id: "R2-N"
      name: "Side Gallery Window"
      width_ft: 4.0
      height_ft: 3.5
      sill_height_ft: 3.0
      offset_ft: 6.0
      notes: ""

  layout_defaults:
    min_gap_ft: 0.30
    ideal_gap_ft: 0.55
    max_gap_ft: 0.95
    snap_to_grid_ft: 0.01
    no_overlap: true
    stay_within_space: true
    allow_vertical_offset: false
    allow_stacking: false