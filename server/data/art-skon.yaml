    - id: wave_painting
      title: The Wave
      artist: Katsushika Hokusai
      year: 1831
      period: Expressionism
      medium: painting
      width_ft: 1.24
      height_ft: 0.84
      orientation: landscape
      image_url: /uploads/1775655689442-katsushika-hokusai-the-wave-courtesy-of-images-metmuseum-org-1.jpg
      source_url: ''
      primary_theme: landscape
      theme_tags:
        - landscape
        - nature_study
      visual_intensity: 0.5
      focal_weight: 0.5
      palette_tags: []
      mood_tags:
        - quiet
        - dramatic
        - calm
        - meditative
      eligible: true
      required: false
      locked: false
      locked_position:
        x_ft: null
        y_ft: null
      notes: >-
        Katsushika Hokusai's The Great Wave off Kanagawa (c. 1830–1831) is a iconic woodblock print depicting a massive,
        claw-like rogue wave threatening three fishing boats off the coast of Japan, with a small, serene Mount Fuji in
        the background. Part of the Thirty-Six Views of Mount Fuji series, it symbolizes the fleeting nature of life and
        nature's power, using vibrant Prussian blue and dynamic composition to capture a dramatic struggle.
